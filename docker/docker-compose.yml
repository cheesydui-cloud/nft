services:
  daemon:
    # Host network is a hard constraint: nft + tc operate on the host kernel.
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: nft:dev
    container_name: nftf-daemon
    cap_add: ["NET_ADMIN", "NET_RAW", "SYS_MODULE"]
    network_mode: host
    volumes:
      - daemon-state:/var/lib/nft
      - daemon-run:/var/run
    command: ["/usr/local/sbin/nft", "daemon"]

  server:
    image: nft:dev
    depends_on: [daemon]
    container_name: nftf-server
    # The server is HTTP-only; bridge isolation is fine and lets a sibling
    # reverse-proxy container reach it via the nftf network without ever
    # exposing :8080 on the host.
    networks: [nftf]
    # By default the panel is reachable only from within the nftf bridge
    # network. To expose it on the host uncomment the ports block, or
    # add your own caddy/nginx service into nftf and reverse-proxy
    # nftf-server:8080.
    # ports:
    #   - "127.0.0.1:8080:8080"
    volumes:
      - daemon-run:/var/run          # share the daemon's unix socket
      - server-data:/var/lib/nft
    command: ["/usr/local/sbin/nft", "server", "--addr", ":8080"]

networks:
  nftf:
    driver: bridge

volumes:
  daemon-state:
  daemon-run:
  server-data:
