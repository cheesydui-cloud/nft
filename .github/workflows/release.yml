name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.58.0)'
        required: true
        default: 'v0.58.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binaries (linux/amd64)
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          LDFLAGS="-X nft/internal/server.buildVersion=$VERSION"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o nft-server ./cmd/nft-server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o nft-agent ./cmd/nft-agent

      - name: Generate checksums
        run: sha256sum nft-server nft-agent > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nft-server
            nft-agent
            SHA256SUMS
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
